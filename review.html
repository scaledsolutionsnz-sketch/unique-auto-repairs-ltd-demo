<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | Unique Auto Repairs Ltd</title>
<meta name="description" content="Tell us how we did. Leave a review for Unique Auto Repairs Ltd, Christchurch.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='16' fill='%23131417'/%3E%3Ctext x='50' y='70' font-size='62' text-anchor='middle' fill='%23F2611B' font-family='Arial Black,Arial' font-weight='900'%3EU%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Staatliches&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#131417;--accent:#f2611b;--accent-dark:#d44e10;--muted:#8a8f98;--line:#2a2d34;--radius:4px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--ink);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;position:relative;overflow-x:hidden}
body:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(242,97,27,.18),transparent 55%);pointer-events:none}
.brand{display:flex;align-items:center;gap:10px;font-family:'Staatliches';font-size:1.5rem;letter-spacing:1px;margin-bottom:40px;position:relative}
.brand .dot{width:34px;height:34px;background:var(--accent);border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.card{position:relative;max-width:560px;width:100%;animation:up .6s ease}
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.eyebrow{color:var(--accent);font-weight:800;text-transform:uppercase;letter-spacing:.2em;font-size:.74rem;margin-bottom:14px}
h1{font-family:'Staatliches';font-weight:400;font-size:clamp(2.2rem,6vw,3.4rem);text-transform:uppercase;line-height:1.04;margin-bottom:14px}
p.sub{color:var(--muted);font-size:1.05rem;max-width:42ch;margin:0 auto 40px}
.stars{display:flex;gap:10px;justify-content:center;margin-bottom:30px}
.stars button{background:none;border:0;font-size:clamp(2.4rem,9vw,3.4rem);color:#3a3d44;cursor:pointer;transition:.15s;line-height:1}
.stars button:hover,.stars button.lit{color:var(--accent);transform:scale(1.12)}
.hint{color:var(--muted);font-size:.9rem;min-height:24px;transition:.2s}
.back{margin-top:46px}
.back a{color:var(--muted);font-weight:700;font-size:.88rem;text-decoration:none;transition:.2s}
.back a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="brand"><span class="dot">U</span> Unique Auto Repairs</div>
<div class="card">
  <p class="eyebrow">Your Feedback</p>
  <h1>How did we do?</h1>
  <p class="sub">Tap a star to rate your experience with Unique Auto Repairs. It only takes a moment.</p>
  <div class="stars" id="stars">
    <button data-v="1" aria-label="1 star">★</button>
    <button data-v="2" aria-label="2 stars">★</button>
    <button data-v="3" aria-label="3 stars">★</button>
    <button data-v="4" aria-label="4 stars">★</button>
    <button data-v="5" aria-label="5 stars">★</button>
  </div>
  <p class="hint" id="hint">Tap to rate</p>
  <div class="back"><a href="index.html">← Back to website</a></div>
</div>
<script>
// 4-5 stars -> Google review; 1-3 -> private feedback form
var GOOGLE_REVIEW_URL="https://g.page/r/PLACEHOLDER/review";
var stars=[...document.querySelectorAll('#stars button')],hint=document.getElementById('hint');
var labels={1:"We're sorry to hear that",2:"We'd like to put it right",3:"Tell us how we can improve",4:"Great — thanks!",5:"Awesome, thank you!"};
stars.forEach(b=>{
  var v=+b.dataset.v;
  b.addEventListener('mouseenter',()=>{stars.forEach(s=>s.classList.toggle('lit',+s.dataset.v<=v));hint.textContent=labels[v];});
  b.addEventListener('click',()=>{
    if(v>=4){window.location.href=GOOGLE_REVIEW_URL;}
    else{window.location.href="private.html?rating="+v;}
  });
});
document.getElementById('stars').addEventListener('mouseleave',()=>{stars.forEach(s=>s.classList.remove('lit'));hint.textContent="Tap to rate";});
</script>
</body>
</html>
